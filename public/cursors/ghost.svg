    <path d="M12 1 C6 1 3 5 3 10 L3 20 L6 17 L9 20 L12 17 L15 20 L18 17 L21 20 L21 10 C21 5 18 1 12 1Z" fill="#000000"/>
    <!-- Ghost body white -->
    <path d="M12 2 C7 2 4 5.5 4 10 L4 19 L6.5 16.5 L9 19 L12 16 L15 19 L17.5 16.5 L20 19 L20 10 C20 5.5 17 2 12 2Z" fill="#FFFFFF"/>
    <!-- Eyes (fuchsia) -->
    <circle cx="9" cy="9" r="2" fill="#D946EF"/>
    <circle cx="15" cy="9" r="2" fill="#D946EF"/>
    <!-- Pupils -->
    <circle cx="9.5" cy="9" r="0.8" fill="#000000"/>
    <circle cx="15.5" cy="9" r="0.8" fill="#000000"/>
    <!-- Cyan glow -->
    <path d="M12 2 C7 2 4 5.5 4 10 L4 19 L6.5 16.5 L9 19 L12 16 L15 19 L17.5 16.5 L20 19 L20 10 C20 5.5 17 2 12 2Z" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
