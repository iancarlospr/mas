<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GhostScan OS Favicon — Pixel art Chloé ghost -->
  <!-- Body outline (cyan glow) -->
  <rect x="12" y="2" width="8" height="2" fill="#00e5ff" opacity="0.5"/>
  <rect x="10" y="4" width="12" height="2" fill="#00e5ff" opacity="0.3"/>
  <!-- Ghost body (white) -->
  <rect x="12" y="4" width="8" height="2" fill="white"/>
  <rect x="10" y="6" width="12" height="2" fill="white"/>
  <rect x="8" y="8" width="16" height="2" fill="white"/>
  <rect x="8" y="10" width="16" height="2" fill="white"/>
  <rect x="8" y="12" width="16" height="2" fill="white"/>
  <rect x="8" y="14" width="16" height="2" fill="white"/>
  <rect x="8" y="16" width="16" height="2" fill="white"/>
  <rect x="8" y="18" width="16" height="2" fill="white"/>
  <!-- Eyes (fuchsia) -->
  <rect x="11" y="11" width="3" height="3" fill="#e040fb"/>
  <rect x="18" y="11" width="3" height="3" fill="#e040fb"/>
  <!-- Eye pupils (dark) -->
  <rect x="12" y="12" width="1" height="1" fill="#1a1a2e"/>
  <rect x="19" y="12" width="1" height="1" fill="#1a1a2e"/>
  <!-- Mouth -->
  <rect x="14" y="15" width="4" height="1" fill="#f0f0f0"/>
  <!-- Bottom wave (ghost tail) -->
  <rect x="8" y="20" width="4" height="4" fill="white"/>
  <rect x="14" y="20" width="4" height="4" fill="white"/>
  <rect x="20" y="20" width="4" height="4" fill="white"/>
  <rect x="12" y="20" width="2" height="2" fill="white"/>
  <rect x="18" y="20" width="2" height="2" fill="white"/>
  <!-- Cyan glow effect around body -->
  <rect x="6" y="10" width="2" height="8" fill="#00e5ff" opacity="0.15"/>
  <rect x="24" y="10" width="2" height="8" fill="#00e5ff" opacity="0.15"/>
</svg>
