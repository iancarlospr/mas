name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────
  # Determine what changed (path filtering)
  # ─────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      engine: ${{ steps.filter.outputs.engine }}
      types: ${{ steps.filter.outputs.types }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/types/**'
            engine:
              - 'apps/engine/**'
              - 'packages/types/**'
            types:
              - 'packages/types/**'
            db:
              - 'supabase/migrations/**'

  # ─────────────────────────────────────────
  # Stage 1: Lint + Type Check (fast, cheap)
  # ─────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.engine == 'true' || needs.changes.outputs.types == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspaces --if-present
      - run: npm run typecheck --workspaces --if-present

  # ─────────────────────────────────────────
  # Stage 2: Unit Tests (parallel per workspace)
  # ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        workspace: [engine, web, types]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npm test --workspace=apps/${{ matrix.workspace }} --workspace=packages/${{ matrix.workspace }} --if-present -- --passWithNoTests --reporter=github-actions
      - name: Upload coverage
        if: matrix.workspace == 'engine'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.workspace }}
          path: apps/${{ matrix.workspace }}/coverage/

  # ─────────────────────────────────────────
  # Stage 3: Integration Tests (needs Redis)
  # ─────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Run integration tests
        run: npm run test:integration --workspace=apps/engine --if-present -- --passWithNoTests
        env:
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_KEY }}

  # ─────────────────────────────────────────
  # Stage 4: Build validation
  # ─────────────────────────────────────────
  build-web:
    name: Build Web
    needs: [changes, unit-tests, integration-tests]
    if: always() && needs.changes.outputs.web == 'true' && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build web app
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENGINE_URL: ${{ secrets.NEXT_PUBLIC_ENGINE_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: /ingest
          NEXT_PUBLIC_APP_URL: https://marketingalphascan.com
      - uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ hashFiles('apps/web/**/*.ts', 'apps/web/**/*.tsx') }}
          restore-keys: nextjs-

  build-engine:
    name: Build Engine Docker
    needs: [changes, unit-tests, integration-tests]
    if: always() && needs.changes.outputs.engine == 'true' && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build engine image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/engine/Dockerfile
          push: false
          tags: alphascan-engine:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Stage 5: E2E Tests (only on main merge)
  # ─────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build apps
        run: npm run build --workspaces --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENGINE_URL: ${{ secrets.NEXT_PUBLIC_ENGINE_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: /ingest
          NEXT_PUBLIC_APP_URL: https://marketingalphascan.com
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_URL }}
          TEST_MODE: 'true'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
